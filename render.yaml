services:
  - type: web
    name: url-audit-kit
    env: node
    repo: https://github.com/samking33/url_audit_kit
    region: oregon
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: URL_AUDIT_DB_PATH
        value: /tmp/url_audit.db
      - key: AI_PROVIDER
        value: nim
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: NVIDIA_NIM_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_NIM_MODEL
        value: meta/llama-3.1-70b-instruct
