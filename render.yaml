services:
  # ── Backend (Python / FastAPI) ────────────────────────────────────────────
  - type: web
    name: url-audit-kit-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m webapp
    healthCheckPath: /healthz
    envVars:
      - key: FRONTEND_APP_URL
        value: https://url-audit-kit-frontend.onrender.com
      - key: URL_AUDIT_DB_PATH
        value: /data/url_audit.db
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: IPINFO_TOKEN
        sync: false
      - key: AI_PROVIDER
        value: nim
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: NVIDIA_NIM_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_NIM_MODEL
        value: meta/llama-3.1-70b-instruct
    disk:
      name: url-audit-data
      mountPath: /data
      sizeGB: 1

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  - type: web
    name: url-audit-kit-frontend
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://url-audit-kit-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://url-audit-kit-backend.onrender.com
      - key: NODE_VERSION
        value: 20
